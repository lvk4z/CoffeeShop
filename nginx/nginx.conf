# ── HTTP only (initial config — used before SSL cert is obtained) ─────────────
# After running setup-ssl.sh this file is replaced with the HTTPS version.

server {
    listen 80;
    server_name _;

    # Let's Encrypt / certbot challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything to Django/Gunicorn
    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_redirect     off;
        client_max_body_size 10M;
    }
}
