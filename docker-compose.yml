services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: copijesz
      POSTGRES_USER: copijesz
      POSTGRES_PASSWORD: copijesz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copijesz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django + React (served via WhiteNoise) ───────────────────────────────────
  web:
    build:
      context: ./coffee_shop
      dockerfile: Dockerfile
    restart: unless-stopped
    # Port 8000 exposed for local dev only.
    # In production nginx proxies :80/:443 → web:8000 internally.
    # Close port 8000 in Azure NSG after setup-ssl.sh runs.
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-change-me-32bytes!!}
      DATABASE_URL: postgresql://copijesz:copijesz@db:5432/copijesz
      EXTRA_ALLOWED_HOSTS: ${EXTRA_ALLOWED_HOSTS:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  # ── nginx reverse proxy (production: port 80 + 443) ─────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certs written by certbot on VM host
      - /var/www/certbot:/var/www/certbot:ro   # ACME challenge files
      - media_data:/app/media:ro
    depends_on:
      - web

  # ── Frontend dev server (hot-reload, only for local development) ─────────────
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    profiles: ["dev"]            # only started with: docker compose --profile dev up
    command: npm run dev
    volumes:
      - ./coffee_shop/frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true   # works inside Docker on Windows/macOS

volumes:
  postgres_data:
  media_data:
